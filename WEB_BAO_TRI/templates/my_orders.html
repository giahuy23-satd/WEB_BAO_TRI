<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-4">

    <h2 class="mb-4">Lịch sử đơn của tôi</h2>

    <table class="table table-bordered bg-white shadow-sm">
        <thead>
            <tr>
                <th>ID</th>
                <th>Loại</th>
                <th>Mô tả</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <th>Xem</th>
            </tr>
        </thead>

        <tbody>
        {% for o in orders %}
            <tr>
                <td>{{ o.id }}</td>
                <td>{{ o.type }}</td>
                <td>{{ o.description }}</td>
                <td><span class="badge bg-info">{{ o.status }}</span></td>
                <td>{{ o.created_at }}</td>
                <td>
                    <a href="/order/{{ o.id }}" class="btn btn-sm btn-primary">Chi tiết</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>
</body>
</html>
