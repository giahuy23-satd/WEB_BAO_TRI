<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo thống kê</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f5f6fa;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .card {
            border-radius: 12px;
            border: none;
        }

        .card-header {
            background: white;
            border-bottom: 1px solid #eee;
            font-size: 18px;
            padding: 14px 18px;
            font-weight: 600;
            color: #34495e;
        }

        .chart-container {
            width: 100%;
            max-width: 550px;
            height: 330px;
            margin: auto;
        }

        canvas {
            max-height: 300px !important;
        }
    </style>
</head>

<body>
<div class="container py-4">

    <h2 class="page-title">
        <i class="bi bi-bar-chart-line"></i> Báo cáo thống kê
    </h2>

    <!-- A. Số lượng đơn theo tháng -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header">
            <i class="bi bi-calendar2-week"></i> Số lượng đơn theo tháng
        </div>
        <div class="card-body">
            <div class="chart-container">
                <canvas id="chartMonthly"></canvas>
            </div>
        </div>
    </div>

    <!-- B. Tỷ lệ loại đơn -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header">
            <i class="bi bi-pie-chart"></i> Tỷ lệ loại đơn (Bảo trì / Sửa chữa)
        </div>
        <div class="card-body">
            <div class="chart-container">
                <canvas id="chartType"></canvas>
            </div>
        </div>
    </div>

    <!-- C. Số lượng đơn theo kỹ thuật viên -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header">
            <i class="bi bi-person-gear"></i> Số lượng đơn theo kỹ thuật viên
        </div>
        <div class="card-body">
            <div class="chart-container">
                <canvas id="chartTech"></canvas>
            </div>
        </div>
    </div>

</div>

<script>
    const monthlyData = {{ monthly_data | safe }};
    const typeData = {{ type_data | safe }};
    const techData = {{ tech_data | safe }};

    new Chart(document.getElementById('chartMonthly'), {
        type: 'line',
        data: monthlyData,
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    new Chart(document.getElementById('chartType'), {
        type: 'pie',
        data: typeData,
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    new Chart(document.getElementById('chartTech'), {
        type: 'bar',
        data: techData,
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>

</body>
</html>
